name: Bug report
description: Something doesn't work the way DESIGN.md / README claims it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please check `DESIGN.md` first — some things
        are deliberately deferred (§5.3) or out of scope (§3).

  - type: input
    id: version
    attributes:
      label: house version
      description: Output of `house --version` (or commit SHA if running from source).
      placeholder: "0.0.0"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: OS / terminal
      description: e.g. "macOS 15.4 / iTerm2 3.5", "Ubuntu 24.04 / kitty 0.40".
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands or keystrokes. If the bug needs a specific markdown file, paste it inline (or link a gist).
      placeholder: |
        1. `house ./docs`
        2. press `j` 30 times
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Screenshots, asciicasts, log output. Drag-and-drop works.
