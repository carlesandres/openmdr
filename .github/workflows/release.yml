name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). Used by manual dry-run."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
            archive: tar
          - target: darwin-x64
            runner: macos-13
            archive: tar
          - target: linux-x64
            runner: ubuntu-latest
            archive: tar
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            archive: tar
          - target: windows-x64
            runner: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: build
        shell: bash
        run: bun run build
      - name: rename + smoke (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bun run smoke
          mv dist/openmdr "dist/openmdr-${{ matrix.target }}"
      - name: rename + smoke (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          bun run smoke
          mv dist/openmdr.exe "dist/openmdr-${{ matrix.target }}.exe"
      - name: archive (tar)
        if: matrix.archive == 'tar'
        shell: bash
        working-directory: dist
        run: tar -czf "openmdr-${{ matrix.target }}.tar.gz" "openmdr-${{ matrix.target }}"
      - name: archive (zip)
        if: matrix.archive == 'zip'
        shell: bash
        working-directory: dist
        run: 7z a "openmdr-${{ matrix.target }}.zip" "openmdr-${{ matrix.target }}.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: openmdr-${{ matrix.target }}
          path: |
            dist/openmdr-${{ matrix.target }}*
            !dist/openmdr-${{ matrix.target }}
            !dist/openmdr-${{ matrix.target }}.exe
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: list artifacts
        run: ls -la artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
